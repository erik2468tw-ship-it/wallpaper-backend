<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP 管理中心</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .logo {
            font-size: 80px;
            margin-bottom: 24px;
        }
        
        h1 {
            font-size: 36px;
            color: #e94560;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
        }
        
        .subtitle {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 48px;
            line-height: 1.6;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .card {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 16px;
            padding: 32px 24px;
            text-decoration: none;
            color: #eee;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .card:hover {
            transform: translateY(-8px);
            border-color: #e94560;
            box-shadow: 0 12px 40px rgba(233, 69, 96, 0.3);
        }
        
        .card-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .card-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
        }
        
        .card-url {
            font-size: 12px;
            color: #4ecdc4;
            margin-top: 12px;
            word-break: break-all;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 168, 120, 0.2);
            border: 1px solid #00a878;
            border-radius: 20px;
            font-size: 14px;
            color: #00a878;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00a878;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .version {
            margin-top: 32px;
            font-size: 12px;
            color: #666;
        }
        
        .config-section {
            margin-top: 40px;
            background: rgba(22, 33, 62, 0.8);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        
        .config-title {
            font-size: 18px;
            color: #e94560;
            margin-bottom: 16px;
        }
        
        .config-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .config-input {
            padding: 12px 16px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .config-input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .config-btn {
            padding: 12px 24px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .config-btn:hover {
            background: #ff6b8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🖥️</div>
        
        <h1>APP 管理中心</h1>
        <p class="subtitle">
            選擇要管理的應用程式<br>
            或設定後端 API 位址
        </p>
        
        <div class="status">
            <span class="status-dot"></span>
            系統運行中
        </div>
        
        <div class="cards">
            <a href="admin.html" class="card">
                <div class="card-icon">🖼️</div>
                <div class="card-title">Auto Wallpaper</div>
                <div class="card-desc">自動桌布更換系統<br>版本管理、圖庫上傳</div>
                <div class="card-url" id="wallpaper-url">-</div>
            </a>
            
            <a href="voiceime-stats.html" class="card">
                <div class="card-icon">🎤</div>
                <div class="card-title">VoiceIME</div>
                <div class="card-desc">智慧語音輸入法<br>統計與版本管理</div>
                <div class="card-url" id="voiceime-url">-</div>
            </a>
        </div>
        
        <div class="config-section">
            <div class="config-title">⚙️ 後端 API 設定</div>
            <div class="config-form">
                <input type="text" id="api-url" class="config-input" placeholder="例如: http://203.222.24.35:3000">
                <button class="config-btn" onclick="saveConfig()">儲存設定</button>
            </div>
        </div>
        
        <div class="version">
            APP 管理中心 v1.0 | Node.js Backend
        </div>
    </div>
    
    <script>
        const CONFIG_KEY = 'backend_config';
        
        // 載入設定
        function loadConfig() {
            const config = localStorage.getItem(CONFIG_KEY);
            if (config) {
                return JSON.parse(config);
            }
            return { apiUrl: window.location.origin };
        }
        
        // 儲存設定
        function saveConfig() {
            const apiUrl = document.getElementById('api-url').value.trim();
            if (!apiUrl) {
                alert('請輸入 API URL');
                return;
            }
            
            const config = { apiUrl: apiUrl };
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
            alert('設定已儲存！');
            
            // 更新顯示
            updateUrls(apiUrl);
        }
        
        // 更新連結URL
        function updateUrls(baseUrl) {
            document.getElementById('wallpaper-url').textContent = baseUrl;
            document.getElementById('voiceime-url').textContent = baseUrl;
            
            // 更新卡片連結
            document.querySelectorAll('.card').forEach(card => {
                const href = card.getAttribute('href');
                if (href.startsWith('admin.html') || href.startsWith('voiceime')) {
                    card.href = href;
                }
            });
        }
        
        // 初始化
        const config = loadConfig();
        document.getElementById('api-url').value = config.apiUrl;
        updateUrls(config.apiUrl);
    </script>
</body>
</html>
