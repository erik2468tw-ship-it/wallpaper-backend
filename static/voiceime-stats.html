<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceIME 管理頁面</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(22, 33, 62, 0.95);
            border-radius: 20px;
            padding: 32px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        h1 { 
            color: #e94560; 
            margin-bottom: 8px;
            font-size: 28px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(233, 69, 96, 0.3);
            padding-bottom: 16px;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .tab:hover {
            background: rgba(233, 69, 96, 0.2);
        }
        .tab.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        .back-link {
            display: inline-block;
            color: #e94560;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .back-link:hover {
            background: rgba(233, 69, 96, 0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
        }
        .stat-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
        }
        .stat-label {
            color: #888;
            font-size: 14px;
        }
        
        .stat-card.success .stat-value { color: #00d9a5; }
        .stat-card.danger .stat-value { color: #ff6b6b; }
        .stat-card.info .stat-value { color: #4ecdc4; }
        
        .refresh-btn {
            display: block;
            width: 200px;
            margin: 0 auto 32px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }
        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .last-update {
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .api-badge {
            display: inline-block;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }
        
        /* 版本管理樣式 */
        .version-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(233, 69, 96, 0.2);
            margin-bottom: 24px;
        }
        .version-card h3 {
            color: #4ecdc4;
            margin-bottom: 16px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #fff;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #e94560;
            color: #fff;
        }
        .btn-primary:hover {
            background: #ff6b8a;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            text-align: center;
        }
        .message.success {
            background: rgba(0, 168, 120, 0.2);
            color: #00a878;
        }
        .message.error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        .current-version {
            text-align: center;
            margin-bottom: 24px;
        }
        .current-version h2 {
            font-size: 48px;
            color: #4ecdc4;
            margin: 10px 0;
        }
        .current-version p {
            color: #888;
            font-size: 14px;
        }
        .info-box {
            background: rgba(78, 205, 196, 0.1);
            border-left: 4px solid #4ecdc4;
            padding: 12px;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 回首頁</a>
        
        <h1>🎤 VoiceIME 管理頁面</h1>
        <p class="subtitle">語音輸入法統計與版本管理</p>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('stats')">📊 統計數據</button>
            <button class="tab" onclick="showTab('version')">📦 版本管理</button>
        </div>
        
        <!-- 統計頁面 -->
        <div id="tab-stats" class="tab-content active">
            <div id="stats-container">
                <div class="loading">載入中</div>
            </div>
            
            <button class="refresh-btn" onclick="loadStats()">
                🔄 重新整理
            </button>
            
            <p class="last-update" id="last-update"></p>
        </div>
        
        <!-- 版本管理頁面 -->
        <div id="tab-version" class="tab-content">
            <div class="current-version">
                <p>目前版本</p>
                <h2 id="currentVersion">載入中...</h2>
                <p id="currentCode">version_code: -</p>
            </div>
            
            <div class="version-card">
                <h3>🔧 版本設定</h3>
                <div class="form-group">
                    <label>版本號 (如: 1.2.0)</label>
                    <input type="text" id="versionName" placeholder="輸入版本號，如 1.2.0">
                </div>
                <div class="form-group">
                    <label>version_code (數字，越大越新)</label>
                    <input type="number" id="versionCode" placeholder="輸入數字，如 23">
                </div>
                <div class="form-group">
                    <label>更新說明</label>
                    <input type="text" id="releaseNotes" placeholder="如：優化效能、修復問題">
                </div>
                <button class="btn btn-primary" onclick="updateVersion()">
                    💾 儲存版本資訊
                </button>
                <div id="version-message"></div>
            </div>
            
            <div class="info-box">
                💡 提示：這個版本資訊會影響 APP 的強制更新判斷。<br>
                當 APP 的 version_code 小於這裡的 version_code 時，APP 會要求更新。
            </div>
        </div>
    </div>
    
    <script>
        // ==================== 分頁切換 ====================
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`.tab[onclick="showTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            if (tabName === 'version') {
                loadCurrentVersion();
            }
        }
        
        // ==================== 統計相關 ====================
        const API_URL = window.location.origin + '/api/stats';
        
        async function loadStats() {
            const container = document.getElementById('stats-container');
            const btn = document.querySelector('.refresh-btn');
            
            btn.disabled = true;
            btn.textContent = '🔄 載入中...';
            container.innerHTML = '<div class="loading">載入中</div>';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                const punct = data.voiceime_punct || {};
                
                const successRate = punct.total_calls > 0 
                    ? ((punct.success_calls / punct.total_calls) * 100).toFixed(1)
                    : 0;
                
                const lastCall = punct.last_call 
                    ? new Date(punct.last_call).toLocaleString('zh-TW')
                    : '無';
                
                container.innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">📱</div>
                            <div class="stat-value">${punct.unique_devices || 0}</div>
                            <div class="stat-label">使用裝置數</div>
                            <span class="api-badge">📲 活躍裝置</span>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📞</div>
                            <div class="stat-value">${punct.total_calls || 0}</div>
                            <div class="stat-label">總呼叫次數</div>
                            <span class="api-badge">API 請求</span>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-icon">✅</div>
                            <div class="stat-value">${punct.success_calls || 0}</div>
                            <div class="stat-label">成功次數</div>
                            <span class="api-badge">✓ 成功</span>
                        </div>
                        <div class="stat-card danger">
                            <div class="stat-icon">❌</div>
                            <div class="stat-value">${punct.failed_calls || 0}</div>
                            <div class="stat-label">失敗次數</div>
                            <span class="api-badge">✗ 失敗</span>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-icon">📈</div>
                            <div class="stat-value">${successRate}%</div>
                            <div class="stat-label">成功率</div>
                            <span class="api-badge">精準標點</span>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 24px;">
                        <p style="color: #888; font-size: 14px;">
                            最後呼叫時間：<span style="color: #4ecdc4">${lastCall}</span>
                        </p>
                    </div>
                `;
                
                document.getElementById('last-update').textContent = 
                    `最後更新：${new Date().toLocaleString('zh-TW')}`;
                
            } catch (error) {
                console.error('Stats load error:', error);
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #ff6b6b;">
                        <p style="font-size: 48px; margin-bottom: 16px;">⚠️</p>
                        <p>無法載入統計資料</p>
                        <p style="font-size: 12px; color: #666; margin-top: 8px;">${error.message || '請確認後端服務是否運行中'}</p>
                    </div>
                `;
            }
            
            btn.disabled = false;
            btn.textContent = '🔄 重新整理';
        }
        
        // ==================== 版本管理相關 ====================
        async function loadCurrentVersion() {
            try {
                const resp = await fetch(window.location.origin + '/api/version/check?app=voiceime&version_code=0');
                const data = await resp.json();
                
                if (data.latest_version) {
                    document.getElementById('currentVersion').textContent = data.latest_version.version;
                    document.getElementById('currentCode').textContent = 'version_code: ' + data.latest_version.version_code;
                    document.getElementById('versionName').value = data.latest_version.version;
                    document.getElementById('versionCode').value = data.latest_version.version_code;
                    document.getElementById('releaseNotes').value = data.latest_version.release_notes || '';
                } else {
                    document.getElementById('currentVersion').textContent = '未設定';
                    document.getElementById('currentCode').textContent = 'version_code: -';
                }
            } catch (e) {
                document.getElementById('currentVersion').textContent = '載入失敗';
            }
        }
        
        async function updateVersion() {
            const version = document.getElementById('versionName').value.trim();
            const versionCode = parseInt(document.getElementById('versionCode').value);
            const releaseNotes = document.getElementById('releaseNotes').value.trim();
            const msg = document.getElementById('version-message');
            
            if (!version || !versionCode) {
                msg.textContent = '請填寫版本號和 version_code';
                msg.className = 'message error';
                msg.style.display = 'block';
                return;
            }
            
            try {
                const resp = await fetch(window.location.origin + '/api/version/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        app: 'voiceime',
                        version: version,
                        version_code: versionCode,
                        release_notes: releaseNotes,
                        download_url: window.location.origin + '/apk/VoiceIME-debug.apk',
                        is_mandatory: true
                    })
                });
                
                if (resp.ok) {
                    msg.textContent = '版本資訊已更新！';
                    msg.className = 'message success';
                    loadCurrentVersion();
                } else {
                    msg.textContent = '更新失敗';
                    msg.className = 'message error';
                }
            } catch (e) {
                msg.textContent = '錯誤: ' + e.message;
                msg.className = 'message error';
            }
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        
        // 首次載入
        loadStats();
    </script>
</body>
</html>
